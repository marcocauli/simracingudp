version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend/src:/app/src
      - ./backend/target:/app/target
    environment:
      - SPRING_PROFILES_ACTIVE: development
    networks:
      - telemetry-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/node_modules:/app/node_modules
    environment:
      - BACKEND_URL: http://backend:8080
    networks:
      - telemetry-network
    restart: unless-stopped

  mock-server:
    build:
      context: ./mock-server
      dockerfile: Dockerfile
    ports:
      - "5606:5606/udp"
    volumes:
      - ./mock-server:/app
    environment:
      - TARGET_HOST: backend
      - SESSION_TYPE: race
      - SESSION_DURATION: 1800
      - UPDATE_RATE: 60
      - ENABLE_TIRE_DEGRADATION: true
      - ENABLE_FUEL_CONSUMPTION: true
      - ENABLE_WEATHER_CHANGES: "false"
      - AI_DRIVERS_COUNT: "19"
      - VERBOSITY: info
    networks:
      - telemetry-network
    restart: unless-stopped

networks:
  telemetry-network:
    driver: bridge