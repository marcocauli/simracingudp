# Spring Boot Application Configuration
spring.application.name=telemetry-reader
spring.profiles.active=dev

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# UDP Configuration
telemetry.udp.port=5606
telemetry.udp.host=0.0.0.0
telemetry.udp.buffer-size=2048

# Database Configuration
# H2 Development Database
spring.datasource.url=jdbc:h2:mem:telemetrydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=NON_NULL

# Logging Configuration
logging.level.com.simracingapps.telemetry-reader=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Management and Monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# WebSocket Configuration
websocket.endpoint=/ws/telemetry
websocket.allowed-origins=*

# Data Retention (in days)
telemetry.data-retention.days=30

# Rate Limiting
telemetry.rate-limit.requests-per-minute=1000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:8080
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*